name: Climber Mechanism Issue
description: Report an issue or request a feature for CAGE climbing systems
title: "[CLIMBER]: "
labels: ["cage-climb", "endgame-targeting"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this issue for the climbing mechanism!

  - type: dropdown
    id: mechanism-type
    attributes:
      label: Mechanism Type
      options:
        - Deep CAGE (2ft 5⅜in)
        - Shallow CAGE (3½in)
        - Release System
        - Targeting System
    validations:
      required: true

  - type: textarea
    id: objective-issue
    attributes:
      label: Objective/Issue
      description: Clear, single-sentence description of the problem or needed feature
      placeholder: "Example: Robot swings excessively after engaging with deep CAGE"
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Describe your proposed approach to solve this issue
      placeholder: |
        - Technical approach
        - Design considerations
        - Implementation steps
        - Required resources
    validations:
      required: true

  - type: textarea
    id: required-kpis
    attributes:
      label: Required KPIs
      description: List measurable requirements for success
      placeholder: |
        - Swing angle < X degrees
        - Climb time < Y seconds
        - Stability margin > Z%
    validations:
      required: true

  - type: textarea
    id: prerequisites
    attributes:
      label: Prerequisites
      description: List required systems and setup needed
      placeholder: |
        - Climb mechanism
        - Stability systems
        - Control requirements
    validations:
      required: true

  - type: textarea
    id: success-metrics
    attributes:
      label: Success Metrics
      description: Specific measurable outcomes to determine completion
      placeholder: |
        - Maximum swing < X degrees
        - Y% successful climbs
        - Climb completed in < Z seconds
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority Level
      options:
        - P0-Critical
        - P1-High
        - P2-Medium
        - P3-Low
    validations:
      required: true

  - type: textarea
    id: additional-info
    attributes:
      label: Additional Information
      description: Any other context, logs, images, or videos?