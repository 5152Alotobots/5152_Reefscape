name: Vision System Issue
description: Report an issue or request a feature for vision and targeting systems
title: "[VISION]: "
labels: ["apriltag-detection", "reef-targeting", "processor-targeting"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this issue for the vision system!

  - type: dropdown
    id: system-type
    attributes:
      label: System Type
      options:
        - AprilTag Detection
        - REEF Targeting
        - PROCESSOR Targeting
        - CAGE Targeting
        - Pose Estimation
    validations:
      required: true

  - type: textarea
    id: objective-issue
    attributes:
      label: Objective/Issue
      description: Clear, single-sentence description of the problem or needed feature
      placeholder: "Example: High latency in AprilTag detection at competition distances"
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Describe your proposed approach to solve this issue
      placeholder: |
        - Technical approach
        - Algorithm improvements
        - Implementation steps
        - Required resources
    validations:
      required: true

  - type: textarea
    id: required-kpis
    attributes:
      label: Required KPIs
      description: List measurable requirements for success
      placeholder: |
        - Detection rate > X FPS
        - Latency < Y ms
        - Accuracy > Z%
    validations:
      required: true

  - type: textarea
    id: prerequisites
    attributes:
      label: Prerequisites
      description: List required systems and setup needed
      placeholder: |
        - Camera system
        - Processing hardware
        - Network requirements
    validations:
      required: true

  - type: textarea
    id: success-metrics
    attributes:
      label: Success Metrics
      description: Specific measurable outcomes to determine completion
      placeholder: |
        - Maintains X FPS at competition distances
        - Achieves < Y ms latency
        - Z% detection accuracy
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority Level
      options:
        - P0-Critical
        - P1-High
        - P2-Medium
        - P3-Low
    validations:
      required: true

  - type: textarea
    id: additional-info
    attributes:
      label: Additional Information
      description: Any other context, logs, images, or videos?