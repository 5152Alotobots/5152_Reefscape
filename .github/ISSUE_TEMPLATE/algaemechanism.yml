name: ALGAE Mechanism Issue
description: Report an issue or request a feature for ALGAE intake/scoring systems
title: "[ALGAE]: "
labels: ["algae-intake", "algae-scoring"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this issue for the ALGAE mechanism!

  - type: dropdown
    id: mechanism-type
    attributes:
      label: Mechanism Type
      options:
        - Ground Intake
        - PROCESSOR Scorer
        - NET Scorer
        - Storage System
        - Transfer System
    validations:
      required: true

  - type: textarea
    id: objective-issue
    attributes:
      label: Objective/Issue
      description: Clear, single-sentence description of the problem or needed feature
      placeholder: "Example: ALGAE compression is causing ball deformation during transfer"
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Describe your proposed approach to solve this issue
      placeholder: |
        - Technical approach
        - Design considerations
        - Implementation steps
        - Required resources
    validations:
      required: true

  - type: textarea
    id: required-kpis
    attributes:
      label: Required KPIs
      description: List measurable requirements for success
      placeholder: |
        - Compression force < X N
        - Transfer speed > Y balls/second
        - Ball deformation < Z%
    validations:
      required: true

  - type: textarea
    id: prerequisites
    attributes:
      label: Prerequisites
      description: List required systems and setup needed
      placeholder: |
        - Compression system
        - Transfer mechanism
        - Control system requirements
    validations:
      required: true

  - type: textarea
    id: success-metrics
    attributes:
      label: Success Metrics
      description: Specific measurable outcomes to determine completion
      placeholder: |
        - Maintains ball shape within X%
        - Achieves Y transfers/minute
        - Z% success rate over N attempts
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority Level
      options:
        - P0-Critical
        - P1-High
        - P2-Medium
        - P3-Low
    validations:
      required: true

  - type: textarea
    id: additional-info
    attributes:
      label: Additional Information
      description: Any other context, logs, images, or videos?