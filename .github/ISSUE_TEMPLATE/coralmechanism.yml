name: CORAL Mechanism Issue
description: Report an issue or request a feature for CORAL intake/scoring systems
title: "[CORAL]: "
labels: ["coral-intake", "coral-scoring"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this issue for the CORAL mechanism!

  - type: dropdown
    id: mechanism-type
    attributes:
      label: Mechanism Type
      options:
        - Ground Intake
        - Storage System
        - L2/L3 Scorer
        - L4 Scorer
        - Transfer System
    validations:
      required: true

  - type: dropdown
    id: issue-type
    attributes:
      label: Issue Type
      options:
        - Bug/Problem
        - Enhancement
        - Design Review
        - Testing Required
        - Documentation Update
    validations:
      required: true

  - type: textarea
    id: current-behavior
    attributes:
      label: Current Behavior
      description: What's currently happening with the mechanism?
      placeholder: "Example: CORAL pieces jam when attempting rapid intake"
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What should be happening?
      placeholder: "Example: CORAL should smoothly transition from ground to storage"
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Enable intake motors
        2. Drive over CORAL at X speed
        3. Attempt to intake Y number of pieces
        4. Observe jam in Z location

  - type: dropdown
    id: test-environment
    attributes:
      label: Test Environment
      options:
        - Practice Bot
        - Competition Bot
        - CAD/Design
        - Simulation
    validations:
      required: true

  - type: input
    id: testing-date
    attributes:
      label: Testing Date
      description: When was this last tested?
      placeholder: "MM/DD/YYYY"

  - type: textarea
    id: additional-info
    attributes:
      label: Additional Information
      description: Any other context, logs, images, or videos?