name: CORAL Mechanism Issue
description: Report an issue or request a feature for CORAL intake/scoring systems
title: "[CORAL]: "
labels: ["coral-intake", "coral-scoring"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this issue for the CORAL mechanism!

  - type: dropdown
    id: mechanism-type
    attributes:
      label: Mechanism Type
      options:
        - Ground Intake
        - Storage System
        - L2/L3 Scorer
        - L4 Scorer
        - Transfer System
    validations:
      required: true

  - type: textarea
    id: objective-issue
    attributes:
      label: Objective/Issue
      description: Clear, single-sentence description of the problem or needed feature
      placeholder: "Example: CORAL pieces jam when attempting rapid scoring on L3 BRANCH"
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Describe your proposed approach to solve this issue
      placeholder: |
        - Technical approach
        - Design considerations
        - Implementation steps
        - Required resources
    validations:
      required: true

  - type: textarea
    id: required-kpis
    attributes:
      label: Required KPIs
      description: List measurable requirements for success
      placeholder: |
        - Release time < X seconds
        - Success rate > Y%
        - Cycle time < Z seconds
    validations:
      required: true

  - type: textarea
    id: prerequisites
    attributes:
      label: Prerequisites
      description: List required systems and setup needed
      placeholder: |
        - Required mechanisms
        - Control systems
        - Sensor requirements
    validations:
      required: true

  - type: textarea
    id: success-metrics
    attributes:
      label: Success Metrics
      description: Specific measurable outcomes to determine completion
      placeholder: |
        - X% success rate over Y attempts
        - Consistent cycle time under Z seconds
        - Zero game piece damage in N cycles
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority Level
      options:
        - P0-Critical
        - P1-High
        - P2-Medium
        - P3-Low
    validations:
      required: true

  - type: textarea
    id: additional-info
    attributes:
      label: Additional Information
      description: Any other context, logs, images, or videos?