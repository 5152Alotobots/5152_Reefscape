name: Bug Report
description: File a bug report (only use this template if your bug report doesn't fit into any mechanism-specific templates)
title: "[BUG]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        
        NOTE: Please only use this template if your bug report doesn't fit into any of the mechanism-specific templates (CORAL, ALGAE, Climber, Vision). For mechanism-specific bugs, use the appropriate mechanism template instead.

  - type: dropdown
    id: subsystem
    attributes:
      label: Subsystem
      options:
        - Drive Train
        - Controls
        - Dashboard
        - Other
    validations:
      required: true

  - type: textarea
    id: objective-issue
    attributes:
      label: Objective/Issue
      description: Clear, single-sentence description of the bug
      placeholder: "Example: Drive train loses encoder position during high-speed turns"
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Describe your proposed approach to fix this issue
      placeholder: |
        - Technical approach
        - Fix methodology
        - Implementation steps
        - Required changes
    validations:
      required: true

  - type: textarea
    id: required-kpis
    attributes:
      label: Required KPIs
      description: List measurable requirements for success
      placeholder: |
        - Error rate reduction
        - Performance improvements
        - Stability metrics
    validations:
      required: true

  - type: textarea
    id: prerequisites
    attributes:
      label: Prerequisites
      description: List required systems and setup needed
      placeholder: |
        - Test environment
        - Required hardware
        - Software dependencies
    validations:
      required: true

  - type: textarea
    id: success-metrics
    attributes:
      label: Success Metrics
      description: Specific measurable outcomes to determine completion
      placeholder: |
        - Bug reproduction rate
        - Fix verification steps
        - Performance restoration
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority Level
      options:
        - P0-Critical
        - P1-High
        - P2-Medium
        - P3-Low
    validations:
      required: true

  - type: textarea
    id: additional-info
    attributes:
      label: Additional Information
      description: Any other context, logs, images, or videos?