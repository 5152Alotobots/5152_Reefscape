name: Bug Report
description: File a bug report for any system
title: "[BUG]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: dropdown
    id: subsystem
    attributes:
      label: Subsystem
      options:
        - CORAL Mechanisms
        - ALGAE Mechanisms
        - Climber
        - Vision
        - Drive Train
        - Controls
        - Dashboard
        - Other
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What actually happened versus what you expected to happen?
      placeholder: "Describe the bug..."
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: Steps to Reproduce
      description: How do we reproduce this issue?
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. See error
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Practice Bot
        - Competition Bot
        - Development
        - Simulation
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log output
      render: shell

  - type: textarea
    id: additional-info
    attributes:
      label: Additional Information
      description: Add any other context about the problem here